<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotifake — Cliente Web</title>
    <link rel="stylesheet" href="css/index.css">
</head>
<body>

<!-- ═══ LOGIN ═══ -->
<div id="login-overlay">
    <div class="login-card">
        <h1> Spotifake</h1>
        <p>Ingresa tu nickname para comenzar</p>
        <input type="text" id="nick-input" placeholder="Tu nickname..." maxlength="30" autocomplete="off" />
        <button class="btn-primary" onclick="iniciarSesion()">Entrar ›</button>
    </div>
</div>

<!-- ═══ APP ═══ -->
<div id="app">
    <header>
        <h1>Spotifake</h1>
        <div class="hdr-right">
            <span id="user-badge" class="badge">👤 —</span>
            <span id="ws-badge" class="badge off">● Desconectado</span>
            <button class="btn-sm" onclick="window.open('admin.html','_blank')">⚙ Admin</button>
            <button class="btn-sm" onclick="cerrarSesion()">⏻ Salir</button>
        </div>
    </header>

    <div class="body-wrap">

        <!-- ─── Sidebar ─── -->
        <aside id="sidebar">
            <!-- Tipos -->
            <div class="sb-section">
                <div class="sb-title">📂 Tipo de audio</div>
                <div id="tipos-wrap"><div class="placeholder">Cargando tipos...</div></div>
            </div>

            <!-- Lista -->
            <div class="sb-section" id="audios-sec" style="display:none">
                <div class="sb-title" id="audios-sec-title">🎵 Audios</div>
                <div id="audios-wrap"></div>
            </div>

            <!-- Detalle -->
            <div class="sb-section" id="detalle-sec" style="display:none">
                <div class="sb-title">📄 Detalle</div>
                <div id="detalle-wrap"></div>
            </div>
        </aside>

        <!-- ─── Panel principal ─── -->
        <main id="main">

            <!-- Reproductor -->
            <div class="card">
                <div class="card-title">🎧 Reproductor</div>
                <div id="now-playing" class="now-playing empty">Selecciona un audio del catálogo para reproducir</div>
                <audio id="audio-player" controls style="display:none"></audio>
                <div id="stream-status"></div>
            </div>

            <!-- Reacciones -->
            <div class="card">
                <div class="card-title">💬 Enviar reacción</div>
                <div class="react-row">
                    <button class="btn-react" id="br-1" disabled onclick="enviarReaccion('❤️')">❤️</button>
                    <button class="btn-react" id="br-2" disabled onclick="enviarReaccion('🔥')">🔥</button>
                    <button class="btn-react" id="br-3" disabled onclick="enviarReaccion('👏')">👏</button>
                    <button class="btn-react" id="br-4" disabled onclick="enviarReaccion('😂')">😂</button>
                    <button class="btn-react" id="br-5" disabled onclick="enviarReaccion('🎵')">🎵</button>
                    <button class="btn-react" id="br-6" disabled onclick="enviarReaccion('😢')">😢</button>
                </div>
            </div>

            <!-- Notificaciones -->
            <div class="card">
                <div class="card-title">🔔 Notificaciones en vivo</div>
                <div id="notif-list">
                    <div class="placeholder">Las notificaciones aparecerán aquí...</div>
                </div>
            </div>

            <!-- Log streaming -->
            <div class="card">
                <div class="card-title">📊 Log de streaming</div>
                <div id="log-area"></div>
            </div>

        </main>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs@2/lib/stomp.min.js"></script>
<script src="./bundle.js"></script>
<script src="./js/funciones.js"></script>
</body>
</html>
